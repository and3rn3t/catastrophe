name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-pr:
    name: Validate Pull Request
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Check PR Title
      uses: amannn/action-semantic-pull-request@v6
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        types: |
          feat
          fix
          docs
          style
          refactor
          perf
          test
          build
          ci
          chore
        requireScope: false
    
    - name: Check for large files
      run: |
        echo "Checking for files larger than 10MB..."
        find . -type f -size +10M | grep -v ".git" || true
        
    - name: Check branch naming
      run: |
        BRANCH_NAME="${{ github.head_ref }}"
        if [[ ! "$BRANCH_NAME" =~ ^(feature|bugfix|hotfix|docs|refactor|test)/.+ ]]; then
          echo "::warning::Branch name '$BRANCH_NAME' doesn't follow convention: feature/, bugfix/, hotfix/, docs/, refactor/, or test/"
        fi
    
    - name: Ensure no merge commits
      run: |
        git log --oneline --merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | grep . && \
        echo "::error::PR contains merge commits. Please rebase." && exit 1 || echo "No merge commits found"
